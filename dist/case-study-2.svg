<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-label="AETHER premium audio e-commerce website design">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e7c97c"/>
      <stop offset="100%" stop-color="#b89346"/>
    </linearGradient>
    <linearGradient id="darkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1e"/>
      <stop offset="100%" stop-color="#0d0d11"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="1200" height="900" rx="40" fill="url(#darkGradient)" />
  
  <rect x="100" y="100" width="1000" height="340" rx="36" fill="#141417" stroke="#2c2e36" stroke-width="2" />
  <rect x="100" y="520" width="400" height="220" rx="30" fill="#141417" stroke="#2c2e36" stroke-width="2" />
  <rect x="560" y="520" width="540" height="220" rx="30" fill="#141417" stroke="#2c2e36" stroke-width="2" />
  
  <g transform="translate(220, 250)">
    <ellipse cx="0" cy="0" rx="32" ry="20" fill="#1f2937" stroke="url(#goldGradient)" stroke-width="2" />
    <path d="M-8 0 L-8 -8 L0 -14 L8 -8 L8 0 Z" fill="url(#goldGradient)" />
    <rect x="-2" y="-8" width="4" height="16" fill="url(#goldGradient)" />
  </g>
  
  <rect x="260" y="232" width="420" height="18" rx="9" fill="#1f2937" />
  <rect x="260" y="266" width="320" height="18" rx="9" fill="#1f2937" />
  <rect x="720" y="180" width="320" height="24" rx="12" fill="url(#goldGradient)" />
  
  <g transform="translate(220, 620)">
    <rect x="0" y="0" width="360" height="24" rx="12" fill="#1f2937" />
    <text x="180" y="16" fill="#9ca3af" font-family="Inter, Arial, sans-serif" font-size="12" text-anchor="middle" letter-spacing="0.1em">EARBUDS COLLECTION</text>
  </g>
  
  <g transform="translate(660, 620)">
    <rect x="0" y="0" width="380" height="24" rx="12" fill="#1f2937" />
    <text x="190" y="16" fill="#9ca3af" font-family="Inter, Arial, sans-serif" font-size="12" text-anchor="middle" letter-spacing="0.1em">STUDIO MONITORS</text>
  </g>
  
  <g transform="translate(900, 600)">
    <path d="M0 0 L-40 -20 L-40 20 Z" fill="url(#goldGradient)" />
    <path d="M0 0 L40 -20 L40 20 Z" fill="url(#goldGradient)" />
    <rect x="-3" y="-20" width="6" height="40" fill="url(#goldGradient)" />
    <path d="M-35 0 L-25 -10 L-25 10 Z" fill="url(#goldGradient)" />
    <path d="M25 0 L35 -10 L35 10 Z" fill="url(#goldGradient)" />
  </g>
  
  <g transform="translate(450, 250)" filter="url(#glow)">
    <circle r="4" fill="url(#goldGradient)" />
    <circle r="8" fill="none" stroke="url(#goldGradient)" stroke-width="1" opacity="0.6" />
    <circle r="12" fill="none" stroke="url(#goldGradient)" stroke-width="1" opacity="0.4" />
  </g>
  
  <text x="100" y="860" fill="#9ca3af" font-family="Inter, Arial, sans-serif" font-size="28">AETHER audio e-commerce with premium aesthetics</text>
</svg>